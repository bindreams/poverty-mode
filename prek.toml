# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

exclude = "^vendor/"
default_install_hook_types = ["pre-commit", "commit-msg"]

# Local hooks ==========================================================================================================
[[repos]]
repo = "local"

[[repos.hooks]]
id = "format-section-comments"
name = "format section comments"
entry = "python scripts/format-section-comments.py"
language = "python"
types_or = ["rust", "python", "toml", "javascript", "ts", "jsx", "tsx", "dockerfile"]

[[repos.hooks]]
id = "format-section-comments-test"
name = 'test "format-section-comments"'
entry = "pytest scripts/format-section-comments.py -q --tb=short --no-header"
language = "python"
pass_filenames = false
always_run = true
additional_dependencies = ["pytest"]

[[repos.hooks]]
id = "cargo-fmt"
name = "cargo fmt"
entry = "cargo fmt"
language = "system"
types = ["rust"]
pass_filenames = false

[[repos.hooks]]
id = "cargo-clippy"
name = "cargo clippy"
entry = "cargo clippy --all-targets -- -D warnings"
language = "system"
types = ["rust"]
pass_filenames = false

# External hooks =======================================================================================================
[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v5.0.0"
hooks = [
  { id = "check-executables-have-shebangs" },
  { id = "check-shebang-scripts-are-executable", exclude_types = ["rust"] },
  { id = "mixed-line-ending", args = ["--fix=lf"] },
]

[[repos]]
repo = "https://github.com/editorconfig-checker/editorconfig-checker.python"
rev = "3.2.1"
hooks = [
  { id = "editorconfig-checker", exclude_types = ["rust", "markdown", "python"] },
]

[[repos]]
repo = "https://github.com/hukkin/mdformat"
rev = "1.0.0"
hooks = [
  { id = "mdformat", additional_dependencies = ["mdformat-gfm"] },
]
