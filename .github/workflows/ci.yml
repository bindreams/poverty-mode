name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: lint (fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format check
        run: cargo fmt --all -- --check

  build-test:
    name: build+test (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Clippy
        run: cargo clippy --target ${{ matrix.target }} --all-targets --locked -- -D warnings

      - name: Build
        run: cargo build --target ${{ matrix.target }} --release --locked

      # Default `cargo test` only. The #[ignore]-d live-central and empirical-claude
      # suites are NEVER run in CI (R7): they require a human-provisioned jbcentral +
      # a JetBrains AI Pro subscription and an interactive browser login. See
      # tests/EMPIRICAL_GATES.md for how to run them locally.
      - name: Test
        run: cargo test --target ${{ matrix.target }} --locked
